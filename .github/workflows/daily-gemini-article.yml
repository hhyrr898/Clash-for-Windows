name: Daily Gemini Article

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Generate 1-9 articles"
        required: true
        default: "1"
        type: choice
        options: ["1", "2", "3", "4", "5", "6", "7", "8", "9"]
      push_all:
        description: "Submit all URLs or only updated articles"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  create-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ARTICLE_COUNT: ${{ github.event.inputs.count || '1' }}
        run: npm run generate:article -- --count=${ARTICLE_COUNT}

      - name: Commit and push
        id: commit
        run: |
          git add src/blog
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add daily Clash for Windows article"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build site
        if: steps.commit.outputs.changed == 'true' || github.event.inputs.push_all == 'true'
        env:
          SITE_URL: ${{ vars.SITE_URL != '' && vars.SITE_URL || 'https://clash-cn.com' }}
        run: npm run build

      - name: Publish Bing update
        if: steps.commit.outputs.changed == 'true' || github.event.inputs.push_all == 'true'
        continue-on-error: true
        env:
          SITE_URL: ${{ vars.SITE_URL != '' && vars.SITE_URL || 'https://clash-cn.com' }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        run: npm run push:bing:${{ github.event.inputs.push_all == 'true' && 'all' || 'updated' }}
