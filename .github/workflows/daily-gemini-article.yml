name: Daily Gemini Article

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Generate 1-9 articles"
        required: true
        default: "1"
      push_all:
        description: "Submit every public URL"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  create-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ARTICLE_COUNT: ${{ github.event.inputs.count || '1' }}
        run: npm run generate:article -- --count=${ARTICLE_COUNT}

      - name: Collect changed articles
        id: changes
        run: |
          git status --short src/blog
          git diff --name-only -- src/blog > changed-files.txt
          git ls-files --others --exclude-standard src/blog >> changed-files.txt
          sort -u changed-files.txt -o changed-files.txt
          {
            echo "files<<EOF"
            cat changed-files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/blog
          git commit -m "Add daily Clash for Windows article"
          git push

      - name: Build site
        if: steps.changes.outputs.files != '' || github.event.inputs.push_all == 'true'
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build

      - name: Publish Bing update
        if: steps.changes.outputs.files != '' || github.event.inputs.push_all == 'true'
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BING_INDEXNOW_KEY: ${{ secrets.BING_INDEXNOW_KEY }}
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
          PUSH_ALL: ${{ github.event.inputs.push_all || 'false' }}
        run: npm run push:bing -- ${{ github.event.inputs.push_all == 'true' && '--all' || '' }}
